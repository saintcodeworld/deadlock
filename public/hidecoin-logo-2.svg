<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111" />
      <stop offset="100%" stop-color="#000" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047" />
      <stop offset="50%" stop-color="#EAB308" />
      <stop offset="100%" stop-color="#A16207" />
    </linearGradient>
    <radialGradient id="eye-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff0000" stop-opacity="1" />
      <stop offset="50%" stop-color="#ff0000" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Coin Base -->
  <circle cx="256" cy="256" r="240" fill="url(#bg2-grad)" stroke="url(#gold-grad)" stroke-width="24" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#gold-grad)" stroke-width="8" stroke-dasharray="20 10" />

  <!-- Keyhole Shape -->
  <path d="M256 140 A 60 60 0 1 0 220 248 L 190 380 L 322 380 L 292 248 A 60 60 0 1 0 256 140 Z" fill="#222" stroke="url(#gold-grad)" stroke-width="8" stroke-linejoin="round" />

  <!-- Eye in the Keyhole -->
  <ellipse cx="256" cy="200" rx="30" ry="15" fill="#fff" />
  <circle cx="256" cy="200" r="12" fill="#000" />
  <circle cx="256" cy="200" r="6" fill="#ff0000" />
  <!-- Glowing effect -->
  <circle cx="256" cy="200" r="40" fill="url(#eye-glow)" style="mix-blend-mode: screen;" />

  <!-- Text HIDE -->
  <path id="curve" fill="transparent" d="M 96 256 A 160 160 0 0 1 416 256" />
  <text fill="url(#gold-grad)" font-family="monospace" font-size="44" font-weight="bold" letter-spacing="12">
    <textPath href="#curve" startOffset="50%" text-anchor="middle">HIDECOIN</textPath>
  </text>
  
  <path id="curve-bottom" fill="transparent" d="M 416 256 A 160 160 0 0 1 96 256" />
  <text fill="url(#gold-grad)" font-family="monospace" font-size="32" font-weight="bold" letter-spacing="8">
    <textPath href="#curve-bottom" startOffset="50%" text-anchor="middle">$HIDE</textPath>
  </text>
</svg>
