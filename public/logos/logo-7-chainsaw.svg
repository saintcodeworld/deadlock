<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#0a0a0a" />
  <!-- Chainsaw Blade -->
  <rect x="150" y="200" width="250" height="60" rx="30" fill="#555" stroke="#333" stroke-width="4" />
  <g fill="#777">
    <!-- Teeth -->
    <path d="M180 200 L190 180 L200 200 Z" />
    <path d="M220 200 L230 180 L240 200 Z" />
    <path d="M260 200 L270 180 L280 200 Z" />
    <path d="M300 200 L310 180 L320 200 Z" />
    <path d="M340 200 L350 180 L360 200 Z" />
    <path d="M180 260 L190 280 L200 260 Z" />
    <path d="M220 260 L230 280 L240 260 Z" />
    <path d="M260 260 L270 280 L280 260 Z" />
    <path d="M300 260 L310 280 L320 260 Z" />
    <path d="M340 260 L350 280 L360 260 Z" />
  </g>
  <!-- Body -->
  <rect x="50" y="180" width="120" height="100" rx="10" fill="#8a0303" />
  <path d="M80 180 L80 140 L120 140 L120 180" fill="none" stroke="#333" stroke-width="10" /> <!-- Handle -->
  <!-- Blood Splatter -->
  <circle cx="380" cy="230" r="15" fill="#ff0000" opacity="0.6" />
  <circle cx="410" cy="210" r="10" fill="#ff0000" opacity="0.4" />
  <text x="256" y="400" fill="#fff" font-family="Impact" font-size="60" text-anchor="middle" letter-spacing="10">HIDE</text>
</svg>
